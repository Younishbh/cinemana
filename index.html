<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينمانا - منصة الأفلام والمسلسلات</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/hero.css">
    <link rel="stylesheet" href="styles/content.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🎬 سينمانا</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">الرئيسية</a></li>
                <li><a href="#movies">الأفلام</a></li>
                <li><a href="#series">المسلسلات</a></li>
                <li><a href="#trending">الترندينج</a></li>
            </ul>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو مسلسل...">
                <button id="searchBtn">🔍</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="hero-content">
            <h2>أفضل الأفلام والمسلسلات</h2>
            <p>استمتع بمشاهدة أحدث الأفلام والمسلسلات العالمية والعربية</p>
            <button class="btn-primary">ابدأ المشاهدة</button>
        </div>
    </section>

    <!-- Main Content -->
    <div class="container">
        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">الكل</button>
                <button class="filter-btn" data-filter="movies">الأفلام</button>
                <button class="filter-btn" data-filter="series">المسلسلات</button>
                <button class="filter-btn" data-filter="trending">الأكثر مشاهدة</button>
            </div>
        </section>

        <!-- Trending Section -->
        <section class="section" id="trending">
            <h2 class="section-title">🔥 الأكثر مشاهدة</h2>
            <div class="content-grid" id="trendingGrid">
                <!-- سيتم ملأه بواسطة JavaScript -->
            </div>
        </section>

        <!-- Movies Section -->
        <section class="section" id="movies">
            <h2 class="section-title">🎞️ الأفلام</h2>
            <div class="content-grid" id="moviesGrid">
                <!-- سيتم ملأه بواسطة JavaScript -->
            </div>
        </section>

        <!-- Series Section -->
        <section class="section" id="series">
            <h2 class="section-title">📺 المسلسلات</h2>
            <div class="content-grid" id="seriesGrid">
                <!-- سيتم ملأه بواسطة JavaScript -->
            </div>
        </section>
    </div>

    <!-- Modal for Details -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body" id="modalBody">
                <!-- سيتم ملأه بالتفاصيل -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 سينمانا - منصة الأفلام والمسلسلات | جميع الحقوق محفوظة</p>
            <div class="social-links">
                <a href="#">Facebook</a>
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
